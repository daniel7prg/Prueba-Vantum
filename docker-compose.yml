services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_vantum
      POSTGRES_PASSWORD: password_secure
      POSTGRES_DB: vantum_db
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - back-tier
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U user_vantum -d vantum_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user_vantum:password_secure@db:5432/vantum_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back-tier
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - back-tier

networks:
  back-tier:
    driver: bridge

volumes:
  db-data:
    driver: local